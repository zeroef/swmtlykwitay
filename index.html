<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iykyk - ❤️ u beebs</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #slideshow {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
    }

    .slide.active {
      opacity: 1;
    }

    #no-images {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      color: #888;
      font-family: sans-serif;
      font-size: 1.25rem;
    }

    #no-images.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="slideshow">
    <p id="no-images">No images found. Add images to the <code>/images</code> folder.</p>
  </div>

  <script>
    const INTERVAL_MS = 5000;
    const FADE_MS = 1000;

    async function loadManifest() {
      const res = await fetch('images/manifest.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('manifest not found');
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    }

    function buildSlides(images) {
      const container = document.getElementById('slideshow');
      // Remove any existing slides
      container.querySelectorAll('.slide').forEach(el => el.remove());

      images.forEach(src => {
        const div = document.createElement('div');
        div.className = 'slide';
        // Encode only the filename component (manifest.json contains only bare filenames)
        div.style.backgroundImage = `url('images/${encodeURIComponent(src)}')`;
        container.appendChild(div);
      });

      return container.querySelectorAll('.slide');
    }

    function startSlideshow(slides) {
      if (!slides.length) return;

      let current = 0;
      slides[current].classList.add('active');

      if (slides.length === 1) return; // Only one image — just show it

      setInterval(() => {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
      }, INTERVAL_MS);
    }

    async function init() {
      const noImages = document.getElementById('no-images');
      try {
        const images = await loadManifest();
        if (!images.length) {
          noImages.classList.add('visible');
          return;
        }
        const slides = buildSlides(images);
        startSlideshow(slides);
      } catch (e) {
        noImages.classList.add('visible');
      }
    }

    init();
  </script>
</body>
</html>
